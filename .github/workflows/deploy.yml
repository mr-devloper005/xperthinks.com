name: Build Push Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout repository without external actions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Prepare pnpm with Corepack
        shell: bash
        run: |
          set -euo pipefail
          node --version
          corepack enable
          corepack prepare pnpm@10.28.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Login to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repo_lower}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${repo_lower}:latest" >> "$GITHUB_OUTPUT"

      - name: Image budget
        run: pnpm images:budget

      - name: Build and push image
        shell: bash
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_LATEST: ${{ steps.image.outputs.latest }}
        run: |
          set -euo pipefail
          printf '%s' "$APP_ENV_PRODUCTION" > .env.build
          node scripts/validate-env.mjs .env.build
          while IFS='=' read -r key value; do
            if [ -z "${key:-}" ] || [[ "$key" == \#* ]]; then
              continue
            fi
            export "$key=$value"
          done < .env.build

          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          docker build \
            --tag "$IMAGE" \
            --tag "$IMAGE_LATEST" \
            --build-arg NEXT_PUBLIC_MASTER_PANEL_URL="${NEXT_PUBLIC_MASTER_PANEL_URL:-}" \
            --build-arg NEXT_PUBLIC_MASTER_API_URL="${NEXT_PUBLIC_MASTER_API_URL:-}" \
            --build-arg NEXT_PUBLIC_SITE_CODE="${NEXT_PUBLIC_SITE_CODE:-}" \
            --build-arg NEXT_PUBLIC_FEED_REVALIDATE_SECONDS="${NEXT_PUBLIC_FEED_REVALIDATE_SECONDS:-}" \
            --build-arg NEXT_PUBLIC_SITE_NAME="${NEXT_PUBLIC_SITE_NAME:-}" \
            --build-arg NEXT_PUBLIC_SITE_TAGLINE="${NEXT_PUBLIC_SITE_TAGLINE:-}" \
            --build-arg NEXT_PUBLIC_SITE_DESCRIPTION="${NEXT_PUBLIC_SITE_DESCRIPTION:-}" \
            --build-arg NEXT_PUBLIC_SITE_DOMAIN="${NEXT_PUBLIC_SITE_DOMAIN:-}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL:-}" \
            --build-arg NEXT_PUBLIC_SITE_OG_IMAGE="${NEXT_PUBLIC_SITE_OG_IMAGE:-}" \
            --build-arg APP_GIT_SHA="$GITHUB_SHA" \
            --build-arg APP_BUILT_AT="$built_at" \
            .

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via native SSH
        shell: bash
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
          DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.image }}
          REPO_NAME: ${{ github.event.repository.name }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Deploy preflight failed: VPS_HOST, VPS_USER, and VPS_SSH_KEY secrets are required."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          APP_ENV_B64="$(printf '%s' "$APP_ENV_PRODUCTION" | base64 -w0)"
          SSH_PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/vps_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=60 \
            "$VPS_USER@$VPS_HOST" \
            "APP_ENV_B64='$APP_ENV_B64' DEPLOY_IMAGE='$DEPLOY_IMAGE' REPO_NAME='$REPO_NAME' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          APP_ROOT="/opt/slot4-sites"
          APP_DIR="$APP_ROOT/$REPO_NAME"

          mkdir -p "$APP_ROOT"

          if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "Deploy preflight failed: GHCR_USERNAME and GHCR_TOKEN secrets are required for repo clone and VPS image pull."
            exit 1
          fi

          GIT_REMOTE_URL="https://x-access-token:${GHCR_TOKEN}@github.com/mr-devloper005/${REPO_NAME}.git"

          if [ -d "$APP_DIR" ] && [ ! -d "$APP_DIR/.git" ]; then
            mv "$APP_DIR" "${APP_DIR}.bootstrap-backup-$(date +%s)"
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone "$GIT_REMOTE_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"

          printf '%s' "$APP_ENV_B64" | base64 -d > .env
          printf '\nDEPLOY_IMAGE=%s\n' "$DEPLOY_IMAGE" >> .env
          chmod 600 .env

          git remote set-url origin "$GIT_REMOTE_URL" 2>/dev/null || true
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          docker compose -f docker-compose.vps.yml pull
          docker compose -f docker-compose.vps.yml up -d --remove-orphans
          docker compose -f docker-compose.vps.yml ps

          APP_PORT_VALUE="$(grep -E "^APP_PORT=" .env | tail -1 | cut -d= -f2- || true)"
          APP_PORT_VALUE="${APP_PORT_VALUE:-3020}"
          for i in 1 2 3 4 5; do
            if wget -qO- "http://127.0.0.1:${APP_PORT_VALUE}/api/health"; then
              echo "Deploy health check passed."
              exit 0
            fi
            sleep 3
          done
          echo "Deploy health check failed after restart."
          exit 1
          REMOTE
